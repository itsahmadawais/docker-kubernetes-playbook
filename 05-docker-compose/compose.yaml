services:
  api:
    build: .
    image: my-api:v1.0
    restart: unless-stopped
    ports:
      - "5000:8000"
    depends_on:
      - postgres-db
    environment:
      DB_HOST: postgres-db
      DB_USER: postgres
      DB_PASSWORD: pass
      DB_NAME: postgres

  postgres-db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis
    restart: unless-stopped

volumes:
  postgres-data: