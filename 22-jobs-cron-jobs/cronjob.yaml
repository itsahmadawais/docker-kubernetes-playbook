apiVersion: batch/v1
kind: CronJob

metadata:
  name: hello-cronjob

spec:
  schedule: "*/1 * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never

          containers:
            - name: hello
              image: busybox:latest

              command:
                - sh
                - -c
                - |
                  echo "CronJob started..."
                  date
                  sleep 10
                  echo "CronJob finished!"