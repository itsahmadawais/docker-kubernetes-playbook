replicaCount: 1

image:
  repository: fastapi-helm
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true

  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  path: /

hpa:
  enabled: true

  minReplicas: 1
  maxReplicas: 5

  targetCPUUtilizationPercentage: 50

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "500m"
    memory: "256Mi"